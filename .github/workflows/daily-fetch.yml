name: STORES POS → Google Spreadsheet Daily

on:
  # スケジュールはGAS (WorkflowDispatcher) から workflow_dispatch で起動
  # 旧cron: '0 0 * * *' (毎日 09:00 JST)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run（Slack投稿・GSheetアップロードをスキップ）'
        type: boolean
        default: false
      create_only:
        description: '空シート構造のみ作成（fetch/Slackをスキップ）'
        type: boolean
        default: false
      month:
        description: '対象月 YYYYMM（create_only時のみ使用、空欄なら当月）'
        required: false
        default: ''
      force_target_date:
        description: 'Slack通知の対象日を明示指定（例: 5月13日）。空欄なら前日'
        required: false
        default: ''
      backfill_month:
        description: '指定月を再取得して該当月シートを上書き（前月の月末締め用 例:202605）。Slack投稿はしない'
        required: false
        default: ''
      recover_target_month:
        description: '事故復旧：このYYYYMMシートを復元（例:202605）。STORES再取得なし。recover_source_monthとセット'
        required: false
        default: ''
      recover_source_month:
        description: '事故復旧：データの実体があるソース月YYYYMM（例:202606）'
        required: false
        default: ''
      clear_month:
        description: '事故復旧：このYYYYMMシートの全タブの値を空にする（構造は保持。誤データ消去用 例:202606）'
        required: false
        default: ''

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        if: ${{ github.event.inputs.create_only != 'true' && github.event.inputs.recover_target_month == '' && github.event.inputs.clear_month == '' }}
        run: npx playwright install --with-deps chromium

      - name: Create empty spreadsheet only
        if: ${{ github.event.inputs.create_only == 'true' }}
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          MONTH_ARG=""
          if [ -n "${{ github.event.inputs.month }}" ]; then
            MONTH_ARG="--month=${{ github.event.inputs.month }}"
          fi
          node upload-gsheet.js --create-only $MONTH_ARG

      - name: Fetch STORES data and upload to Google Sheets
        if: ${{ github.event.inputs.create_only != 'true' && github.event.inputs.backfill_month == '' && github.event.inputs.recover_target_month == '' && github.event.inputs.clear_month == '' }}
        env:
          STORES_EMAIL: ${{ secrets.STORES_EMAIL }}
          STORES_PASSWORD: ${{ secrets.STORES_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DEST_BOT_TOKEN: ${{ secrets.DEST_BOT_TOKEN }}
          DEST_CHANNEL_ID: ${{ secrets.DEST_CHANNEL_ID }}
          FORCE_TARGET_DATE: ${{ github.event.inputs.force_target_date }}
        run: node index.js ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      # 月末締め用バックフィル：指定月（前月）を再取得して該当月シートを上書き。Slack投稿はしない。
      - name: Backfill specific month
        if: ${{ github.event.inputs.create_only != 'true' && github.event.inputs.backfill_month != '' }}
        env:
          STORES_EMAIL: ${{ secrets.STORES_EMAIL }}
          STORES_PASSWORD: ${{ secrets.STORES_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          M="${{ github.event.inputs.backfill_month }}"
          node fetch-stores-data.js --month=$M --date=last_month
          node upload-gsheet.js --month=$M

      # 事故復旧：ソース月シートのデータを読み取り、対象月シートを復元する。STORES再取得なし・Slack投稿なし。
      - name: Recover target month from source sheet
        if: ${{ github.event.inputs.recover_target_month != '' }}
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          SRC="${{ github.event.inputs.recover_source_month }}"
          TGT="${{ github.event.inputs.recover_target_month }}"
          node recover-from-sheet.js --source=$SRC --target=$TGT
          node upload-gsheet.js --month=$TGT

      # 事故復旧：指定月シートの全タブの値を空にする（構造は保持）。誤データ消去用。
      - name: Clear month sheet values
        if: ${{ github.event.inputs.clear_month != '' }}
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node recover-from-sheet.js --clear=${{ github.event.inputs.clear_month }}

      - name: Upload screenshots as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore
